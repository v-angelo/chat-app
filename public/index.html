<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <!-- css -->
    <link rel="stylesheet" href="style.css" />
    <!-- fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap"
      rel="stylesheet"
    />
    <!-- socket.io cdn -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"
      integrity="sha512-8ExARjWWkIllMlNzVg7JKq9RKWPlJABQUNq6YvAjE/HobctjH/NA+bSiDMDvouBVjp4Wwnf1VP1OEv7Zgjtuxw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <!-- frontend js script -->
    <script src="app.js" defer></script>
  </head>
  <body>
    <main>
      <!-- theme selector -->
      <header>
        <h3>Select Theme</h3>
        <select class="theme-selector" onchange="setTheme(this.value)">
          <option value="">WhatsApp</option>
          <option value="cyberpunk">Cyberpunk</option>
          <option value="discord">Discord</option>
          <option value="amoled">AMOLED</option>
        </select>
      </header>

      <!-- form when somebody joins a chat room -->
      <form class="form-join">
        <input
          type="text"
          id="name"
          maxlength="8"
          placeholder="Your name"
          size="5"
          required
        />

        <input
          type="text"
          id="room"
          placeholder="Chat room"
          size="5"
          required
        />

        <button type="submit" id="join">Join</button>
      </form>

      <ul class="chat-display"></ul>

      <p class="user-list"></p>

      <p class="room-list"></p>

      <p class="activity"></p>

      <!-- form for sending messages -->
      <form class="form-msg">
        <input type="text" id="message" placeholder="Your message" required />
        <button type="submit">Send</button>
      </form>
    </main>
  </body>
</html>
